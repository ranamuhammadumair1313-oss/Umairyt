<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umair Studio - AI Chat</title>
    <!-- Google Fonts for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #171717;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            padding: 20px;
            background: #212121;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            color: #10a37f; /* ChatGPT Green Color */
            letter-spacing: 1px;
        }

        /* Chat Area */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: #444 #171717;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: #10a37f;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #2f2f2f;
            color: #ececf1;
            border-bottom-left-radius: 2px;
        }

        /* Typing Indicator */
        .typing {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 10px;
            display: none;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #212121;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2f2f2f;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #10a37f;
        }

        button {
            padding: 10px 20px;
            background-color: #10a37f;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0d8a6a;
        }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Umair Studio AI</h1>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Assalam-o-Alaikum! Main Umair Studio AI hoon. Main aap ki kya madad kar sakta hoon?</div>
        </div>

        <div id="typingIndicator" class="typing" style="margin-left: 20px;">Umair Studio is thinking...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Yahan apna sawal likhen..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        function sendMessage() {
            const messageText = userInput.value.trim();
            if (messageText === "") return;

            // 1. User Message Add Karen
            addMessage(messageText, 'user-message');
            userInput.value = "";

            // 2. Typing Indicator Show Karen
            typingIndicator.style.display = "block";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. AI Response (Simulated)
            setTimeout(() => {
                typingIndicator.style.display = "none";
                const aiResponse = getAIResponse(messageText);
                addMessage(aiResponse, 'ai-message');
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1500);
        }

        function addMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', className);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Ye function sawal ke mutabiq jawab dega
        function getAIResponse(input) {
            const lowerInput = input.toLowerCase();
            
            if (lowerInput.includes("hello") || lowerInput.includes("hi") || lowerInput.includes("salam")) {
                return "Walaikum Assalam! Umair Studio mein khush amdeed. Main aap ki kaise madad kar sakta hoon?";
            } else if (lowerInput.includes("kaise ho") || lowerInput.includes("how are you")) {
                return "Main bilkul theek hoon, shukriya! Aap sunayen, aap ka din kaisa guzar raha hai?";
            } else if (lowerInput.includes("naam") || lowerInput.includes("name")) {
                return "Mera naam Umair Studio AI hai.";
            } else if (lowerInput.includes("kaam") || lowerInput.includes("work")) {
                return "Main ek AI model hoon jo aapke sawalon ke jawab dene ke liye banaya gaya hoon.";
            } else {
                return "Zabardast sawal hai! Is bare mein mazeed maloomat ke liye main search kar sakta hoon. Kya aap mazeed detail bata sakte hain?";
            }
        }

        // Enter key se message send karne ke liye
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
